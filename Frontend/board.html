<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Board</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="css/board.css">
</head>
<body>
    <!-- Панель управления -->
    <div id="controls">
        <span id="toolbar-grip" title="Переместить панель">
            <i class="fa-solid fa-grip-vertical"></i>
        </span>
        <button id="selection-tool-btn" class="control-btn" title="Выделение (V)">
            <i class="fa-solid fa-mouse-pointer"></i>
        </button>

        <div class="ctrl-divider"></div>

        <button id="add-sticker-btn" class="control-btn" title="Добавить стикер (A)">
            <i class="fa-solid fa-note-sticky"></i>
        </button>
        <button id="add-reminder-btn" class="control-btn" title="Добавить напоминание (R)">
            <i class="fa-solid fa-calendar-plus"></i>
        </button>
        <button id="text-tool-btn" class="control-btn" title="Текст (T)">
            <i class="fa-solid fa-font"></i>
        </button>

        <div class="ctrl-divider"></div>

        <button id="draw-tool-btn" class="control-btn" title="Рисовать (D)">
            <i class="fa-solid fa-pencil"></i>
        </button>
        <button id="eraser-tool-btn" class="control-btn" title="Ластик (E)">
            <i class="fa-solid fa-eraser"></i>
        </button>

        <div class="ctrl-divider"></div>

        <!-- Соединение нитями -->
        <button id="connect-tool-btn" class="control-btn" title="Соединить стикеры нитью (C)">
            <i class="fa-solid fa-link"></i>
        </button>

        <div class="ctrl-divider"></div>

        <!-- Тема -->
        <button id="theme-btn" class="control-btn" title="Тема доски">
            <i class="fa-solid fa-palette"></i>
        </button>

        <div class="ctrl-divider"></div>

        <button id="delete-btn" class="control-btn" title="Удалить (Delete)">
            <i class="fa-solid fa-trash-can"></i>
        </button>

        <!-- Палитра цветов стикеров -->
        <div id="color-palette" class="palette hidden">
            <div class="color-swatch" data-color="#ffc"></div>
            <div class="color-swatch" data-color="#cfc"></div>
            <div class="color-swatch" data-color="#ccf"></div>
            <div class="color-swatch" data-color="#fcc"></div>
            <div class="color-swatch" data-color="#cff"></div>
            <div class="color-swatch" data-color="#fcf"></div>
        </div>

        <!-- Параметры рисования -->
        <div id="drawing-options" class="palette hidden">
            <div class="brush-type">
                <button id="pen-btn" class="brush-btn active" title="Перо"><i class="fa-solid fa-pen-nib"></i></button>
                <button id="highlighter-btn" class="brush-btn" title="Маркер"><i class="fa-solid fa-highlighter"></i></button>
            </div>
            <input type="color" id="brush-color-input" value="#000000" title="Цвет кисти">
            <input type="range" id="brush-size-slider" min="1" max="50" value="2" title="Размер кисти">
        </div>

        <!-- Параметры ластика -->
        <div id="eraser-options" class="palette hidden">
            <input type="range" id="eraser-size-slider" min="1" max="50" value="20" title="Размер ластика">
        </div>

        <!-- Параметры нити -->
        <div id="connection-options" class="palette hidden">
            <label>Цвет:</label>
            <input type="color" id="connection-color-input" value="#4a90d9" title="Цвет нити">
            <label>Стиль:</label>
            <select id="connection-style-select">
                <option value="solid">Сплошная</option>
                <option value="dashed">Пунктир</option>
            </select>
        </div>
    </div>

    <!-- Панель тем -->
    <div id="theme-panel" class="hidden">
        <div class="panel-title">Тема доски</div>
        <div class="theme-option active" data-theme="classic">
            <span class="theme-swatch" style="background:#f9f9f9;"></span>
            Классика
        </div>
        <div class="theme-option" data-theme="dark">
            <span class="theme-swatch" style="background:#1a1a2e; border-color:#555;"></span>
            Тёмная
        </div>
        <div class="theme-option" data-theme="sky">
            <span class="theme-swatch" style="background:#e3f2fd;"></span>
            Небо
        </div>
        <div class="theme-option" data-theme="forest">
            <span class="theme-swatch" style="background:#e8f5e9;"></span>
            Лес
        </div>
        <div class="theme-option" data-theme="warm">
            <span class="theme-swatch" style="background:#fff8e1;"></span>
            Тёплая
        </div>
    </div>

    <!-- Подсказка режима соединения -->
    <div id="connect-hint">
        Кликните на первый стикер, затем на второй · ПКМ по нити — удалить · Esc — выйти
    </div>

    <!-- Text toolbar -->
    <div id="text-toolbar" class="hidden">
        <input type="number" id="font-size-input" min="1" value="30">
        <button id="bold-btn" class="text-style-btn" title="Жирный"><i class="fa-solid fa-bold"></i></button>
        <button id="italic-btn" class="text-style-btn" title="Курсив"><i class="fa-solid fa-italic"></i></button>
        <button id="underline-btn" class="text-style-btn" title="Подчёркивание"><i class="fa-solid fa-underline"></i></button>
        <input type="color" id="text-highlight-color-input" value="#ffffff" title="Цвет выделения">
    </div>

    <div id="sticker-board"></div>

    <script src="https://unpkg.com/konva@9.3.6/konva.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
        (function () {
            const hint = document.getElementById('connect-hint');
            const connectBtn = document.getElementById('connect-tool-btn');
            if (!hint || !connectBtn) return;
            const observer = new MutationObserver(() => {
                hint.classList.toggle('visible', connectBtn.classList.contains('active'));
            });
            observer.observe(connectBtn, { attributes: true, attributeFilter: ['class'] });
        })();
    </script>

    <script type="module" src="js/board.js"></script>
</body>
</html>
