services:
  nginx:
    image: nginx:1.25-alpine
    restart: on-failure
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./staticfiles:/static:ro
      - ./media:/media:ro
      # После выпуска сертификата заменить dev.conf на prod.conf:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - web
    networks:
      - app_network

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    env_file:
      - .env
    # Порт наружу НЕ публикуем: БД доступна только из сети app_network
    networks:
      - app_network

  web:
    build: .
    restart: unless-stopped
    volumes:
      - .:/app
      - ./staticfiles:/static
      - ./media:/media
      - ./templates/js:/static/js
    env_file:
      - .env
    command: >
      sh -c "
        echo 'Waiting for PostgreSQL to start...'
        while ! nc -z db 5432; do
          sleep 1
        done
        echo 'PostgreSQL started'
        python manage.py collectstatic --noinput &&
        python manage.py migrate &&
        gunicorn reminder_project.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "
    #ports:
    #  - "8000:8000"
    depends_on:
      - db
    networks:
      - app_network

  # Запускается только вручную: docker compose run --rm certbot ...
  certbot:
    image: certbot/certbot
    profiles: ["tools"]
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  postgres_data_v2:
  certbot_certs:
  certbot_www:

networks:
  app_network:
    driver: bridge