<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ запрещен | CloudReminders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #010409;
            color: #f0f6fc;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center overflow-hidden relative">
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-[#f85149]/10 blur-[80px]"></div>
    </div>

    <div class="relative z-10 text-center flex flex-col items-center">
        <div class="w-24 h-24 bg-[#f85149]/10 border border-[#f85149]/20 rounded-3xl flex items-center justify-center mb-8 shadow-[0_0_40px_rgba(248,81,73,0.2)]">
            <i data-lucide="lock" class="w-12 h-12 text-[#f85149]"></i>
        </div>
        
        <h1 class="text-6xl font-black mb-4 tracking-tighter">Доступ закрыт</h1>
        <p class="text-xl text-white/50 mb-10 max-w-md">
            Похоже, у вас нет прав для просмотра этой доски, или вы еще не приняли приглашение.
        </p>
        
        <a href="/" class="bg-[#f0f6fc] text-[#010409] font-bold px-8 py-4 rounded-xl hover:bg-[#58a6ff] hover:text-white transition-all shadow-xl">
            Вернуться на главную
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
